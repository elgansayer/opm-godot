# Build GDExtension for Android (arm64 and x86_64).
name: Build Android

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: x86_64

    runs-on: ubuntu-22.04
    name: android-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28b
          link-to-sdk: true

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons || pip install scons --break-system-packages

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ zlib1g-dev bison flex zip unzip

      - name: Generate parser sources
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: List Android NDKs
        run: ls -R /usr/local/lib/android/sdk/ndk || true

      - name: Build GDExtension
        working-directory: openmohaa
        run: scons platform=android arch=${{ matrix.arch }} target=template_debug -j$(nproc) dev_build=yes disable_exceptions=no
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Zip GDExtension artifacts
        run: |
          cd openmohaa/bin
          zip -r ../../gdextension-android-${{ matrix.arch }}.zip .
          cd ../..

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-android-${{ matrix.arch }}
          path: gdextension-android-${{ matrix.arch }}.zip
          if-no-files-found: warn
