# Build GDExtension for Linux (x86_64 and arm64), then export as standalone game.
name: Build Linux

on:
  workflow_dispatch:
  workflow_call:

env:
  GODOT_VERSION: "4.6.1"

jobs:
  build:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-22.04
            experimental: false
          - arch: arm64
            os: ubuntu-24.04-arm
            experimental: true

    runs-on: ${{ matrix.os }}
    name: linux-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons || pip install scons --break-system-packages

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ zlib1g-dev bison flex zip unzip wget

      - name: Generate parser sources
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: Build GDExtension
        working-directory: openmohaa
        run: scons platform=linux arch=${{ matrix.arch }} target=template_debug -j$(nproc) dev_build=yes disable_exceptions=no

      - name: Zip GDExtension artifacts
        run: |
          cd openmohaa/bin
          zip -r ../../gdextension-linux-${{ matrix.arch }}.zip .
          cd ../..

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-linux-${{ matrix.arch }}
          path: gdextension-linux-${{ matrix.arch }}.zip
          if-no-files-found: warn

      # ── Godot Export: standalone game executable ──
      - name: Install Godot
        if: matrix.arch == 'x86_64'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp
          sudo mv "/tmp/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        if: matrix.arch == 'x86_64'
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"

      - name: Deploy library to project
        if: matrix.arch == 'x86_64'
        run: |
          mkdir -p project/bin
          cp -f openmohaa/bin/libopenmohaa.so project/bin/
          cp -f openmohaa/bin/libcgame.so project/bin/ || true

      - name: Export Godot project
        if: matrix.arch == 'x86_64'
        run: |
          mkdir -p dist/linux
          cd project
          godot --headless --export-debug "Linux" ../dist/linux/shinmohaa.x86_64 2>&1 || true
          test -f ../dist/linux/shinmohaa.x86_64

      - name: Stage companion binaries
        if: matrix.arch == 'x86_64'
        run: |
          cp -f openmohaa/bin/libcgame.so dist/linux/cgame.so || true

      - name: Zip game export
        if: matrix.arch == 'x86_64'
        run: |
          cd dist/linux
          zip -r ../../shinmohaa-linux-x86_64.zip .
          cd ../..

      - name: Upload game export
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: shinmohaa-linux-x86_64
          path: shinmohaa-linux-x86_64.zip
          if-no-files-found: warn
