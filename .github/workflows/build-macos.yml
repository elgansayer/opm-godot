# Build GDExtension for macOS (x86_64 and arm64).
name: Build macOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            experimental: true
          - arch: arm64
            experimental: true

    runs-on: macos-14
    name: macos-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons || pip install scons --break-system-packages

      - name: Install macOS dependencies
        run: |
          brew install bison flex
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH

      - name: Generate parser sources
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: Build GDExtension
        working-directory: openmohaa
        run: scons platform=macos arch=${{ matrix.arch }} target=template_debug -j$(sysctl -n hw.ncpu) dev_build=yes disable_exceptions=no

      - name: Zip GDExtension artifacts
        run: |
          cd openmohaa/bin
          zip -r ../../gdextension-macos-${{ matrix.arch }}.zip .
          cd ../..

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-macos-${{ matrix.arch }}
          path: gdextension-macos-${{ matrix.arch }}.zip
          if-no-files-found: warn
