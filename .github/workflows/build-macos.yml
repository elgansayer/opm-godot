# Build GDExtension for macOS (x86_64 and arm64), then export as standalone game.
name: Build macOS

on:
  workflow_dispatch:
  workflow_call:

env:
  GODOT_VERSION: "4.6.1"

jobs:
  build:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            experimental: true
          - arch: arm64
            experimental: true

    runs-on: macos-14
    name: macos-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons || pip install scons --break-system-packages

      - name: Install macOS dependencies
        run: |
          brew install bison flex
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH

      - name: Generate parser sources
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: Build GDExtension
        working-directory: openmohaa
        run: scons platform=macos arch=${{ matrix.arch }} target=template_debug -j$(sysctl -n hw.ncpu) dev_build=yes disable_exceptions=no

      - name: Zip GDExtension artifacts
        run: |
          cd openmohaa/bin
          zip -r ../../gdextension-macos-${{ matrix.arch }}.zip .
          cd ../..

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-macos-${{ matrix.arch }}
          path: gdextension-macos-${{ matrix.arch }}.zip
          if-no-files-found: warn

      # ── Godot Export: standalone game .app bundle ──
      - name: Install Godot
        if: matrix.arch == 'arm64'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp
          sudo cp -R "/tmp/Godot.app" /Applications/Godot.app
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        if: matrix.arch == 'arm64'
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"

      - name: Deploy library to project
        if: matrix.arch == 'arm64'
        run: |
          mkdir -p project/bin
          cp -f openmohaa/bin/libopenmohaa.dylib project/bin/
          cp -f openmohaa/bin/libcgame.dylib project/bin/ || true

      - name: Export Godot project
        if: matrix.arch == 'arm64'
        run: |
          mkdir -p dist/macos
          cd project
          godot --headless --export-debug "macOS" ../dist/macos/ShinMOHAA.app 2>&1 || true
          test -d ../dist/macos/ShinMOHAA.app

      - name: Stage companion binaries
        if: matrix.arch == 'arm64'
        run: |
          cp -f openmohaa/bin/libcgame.dylib dist/macos/cgame.dylib || true

      - name: Zip game export
        if: matrix.arch == 'arm64'
        run: |
          cd dist/macos
          zip -r -y ../../shinmohaa-macos-arm64.zip .
          cd ../..

      - name: Upload game export
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: shinmohaa-macos-arm64
          path: shinmohaa-macos-arm64.zip
          if-no-files-found: warn
