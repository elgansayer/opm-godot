# Build native GDExtension libraries for Linux, macOS, and Windows.
# Triggered on push to main, PRs, and manual dispatch.
name: Build Native

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            arch: x86_64
            experimental: false
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
            experimental: true
          - platform: macos
            os: macos-14
            arch: x86_64
            experimental: true
          - platform: macos
            os: macos-14
            arch: arm64
            experimental: true
          - platform: windows
            os: windows-2022
            arch: x86_64
            experimental: false
          - platform: windows
            os: windows-2022
            arch: arm64
            experimental: true
          - platform: android
            os: ubuntu-22.04
            arch: arm64
            experimental: true
          - platform: android
            os: ubuntu-22.04
            arch: x86_64
            experimental: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK (Android)
        id: setup-ndk
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          # r25c corresponds to version 25.2.9519653.
          # link-to-sdk symlinks it into $ANDROID_HOME/ndk/25.2.9519653/ so that
          # the SConstruct (which reads ANDROID_NDK_VERSION from the env) can
          # find the toolchain at $ANDROID_HOME/ndk/$ANDROID_NDK_VERSION/.
          ndk-version: r25c
          link-to-sdk: true

      - name: Set up MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons || pip install scons --break-system-packages

      - name: Install Linux dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ zlib1g-dev bison flex zip unzip

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install bison flex
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        run: choco install winflexbison3 -y

      - name: Generate parser sources (Linux/macOS)
        if: matrix.platform != 'windows'
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: Generate parser sources (Windows)
        if: matrix.platform == 'windows'
        working-directory: openmohaa
        shell: cmd
        run: |
          if not exist "code\parser\generated\yyParser.hpp" (
            if not exist "code\parser\generated" mkdir "code\parser\generated"
            win_bison --defines="code\parser\generated\yyParser.hpp" -o "code\parser\generated\yyParser.cpp" code\parser\bison_source.txt
            win_flex -Cem --nounistd -o "code\parser\generated\yyLexer.cpp" --header-file="code\parser\generated\yyLexer.h" code\parser\lex_source.txt
          )

      - name: List Android NDKs
        if: matrix.platform == 'android'
        run: ls -R /usr/local/lib/android/sdk/ndk || true

      - name: Patch sources for Windows build
        if: matrix.platform == 'windows'
        run: python scripts/patch-build.py --platform windows

      - name: Build GDExtension
        if: matrix.platform != 'windows'
        working-directory: openmohaa
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug -j1 dev_build=yes disable_exceptions=no
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build GDExtension (Windows)
        if: matrix.platform == 'windows'
        working-directory: openmohaa
        shell: pwsh
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug -j1 dev_build=yes disable_exceptions=no

      - name: Zip GDExtension artifacts (non-Windows)
        if: matrix.platform != 'windows'
        run: |
          cd openmohaa/bin
          zip -r ../../gdextension-${{ matrix.platform }}-${{ matrix.arch }}.zip .
          cd ../..

      - name: Zip GDExtension artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "openmohaa/bin/*" -DestinationPath "gdextension-${{ matrix.platform }}-${{ matrix.arch }}.zip"

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-${{ matrix.platform }}-${{ matrix.arch }}
          path: gdextension-${{ matrix.platform }}-${{ matrix.arch }}.zip
          if-no-files-found: warn
