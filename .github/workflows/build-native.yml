# Build native GDExtension libraries for Linux, macOS, and Windows.
# Triggered on push to main, PRs, and manual dispatch.
name: Build Native

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            arch: x86_64
            experimental: false
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
            experimental: true
          - platform: macos
            os: macos-13
            arch: x86_64
            experimental: false
          - platform: macos
            os: macos-14
            arch: arm64
            experimental: false
          - platform: windows
            os: windows-2022
            arch: x86_64
            experimental: false
          - platform: windows
            os: windows-2022
            arch: arm64
            experimental: true
          - platform: android
            os: ubuntu-22.04
            arch: arm64
            experimental: true
          - platform: android
            os: ubuntu-22.04
            arch: x86_64
            experimental: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Check Submodule Status
        run: git submodule status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK (Android)
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install SCons
        run: pip install scons

      - name: Install Linux dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ zlib1g-dev bison flex zip unzip

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install bison flex
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        run: choco install winflexbison3 -y

      - name: Generate parser sources (Linux/macOS)
        if: matrix.platform != 'windows'
        working-directory: openmohaa
        run: |
          PARSER_DIR="code/parser/generated"
          if [[ ! -f "$PARSER_DIR/yyParser.hpp" ]]; then
            mkdir -p "$PARSER_DIR"
            bison --defines="$PARSER_DIR/yyParser.hpp" -o "$PARSER_DIR/yyParser.cpp" code/parser/bison_source.txt
            flex -Cem --nounistd -o "$PARSER_DIR/yyLexer.cpp" --header-file="$PARSER_DIR/yyLexer.h" code/parser/lex_source.txt
          fi

      - name: Generate parser sources (Windows)
        if: matrix.platform == 'windows'
        working-directory: openmohaa
        shell: cmd
        run: |
          if not exist "code\parser\generated\yyParser.hpp" (
            if not exist "code\parser\generated" mkdir "code\parser\generated"
            win_bison --defines="code\parser\generated\yyParser.hpp" -o "code\parser\generated\yyParser.cpp" code\parser\bison_source.txt
            win_flex -Cem --nounistd -o "code\parser\generated\yyLexer.cpp" --header-file="code\parser\generated\yyLexer.h" code\parser\lex_source.txt
          )

      - name: Build GDExtension
        if: matrix.platform != 'windows'
        working-directory: openmohaa
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug -j2 dev_build=yes

      - name: Build GDExtension (Windows)
        if: matrix.platform == 'windows'
        working-directory: openmohaa
        shell: pwsh
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug -j2 dev_build=yes

      - name: Upload GDExtension artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            openmohaa/bin/*
          if-no-files-found: warn
