# Full release pipeline: build all platforms, export games, create GitHub Release.
# Triggered only on release publish and manual dispatch.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        default: "v0.0.0-dev"
      create_release:
        description: "Create a GitHub Release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build each platform (library + game export) ───
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-android:
    uses: ./.github/workflows/build-android.yml
    secrets: inherit

  build-web:
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  # ─── Create GitHub Release with all game exports ───
  release:
    needs: [build-linux, build-macos, build-windows, build-android, build-web]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -80

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets

          # ── Game exports (standalone playable) ──
          # Linux game
          [ -f artifacts/shinmohaa-linux-x86_64/shinmohaa-linux-x86_64.zip ] && \
            cp artifacts/shinmohaa-linux-x86_64/shinmohaa-linux-x86_64.zip release_assets/

          # Windows game
          [ -f artifacts/shinmohaa-windows-x86_64/shinmohaa-windows-x86_64.zip ] && \
            cp artifacts/shinmohaa-windows-x86_64/shinmohaa-windows-x86_64.zip release_assets/

          # macOS game
          [ -f artifacts/shinmohaa-macos-arm64/shinmohaa-macos-arm64.zip ] && \
            cp artifacts/shinmohaa-macos-arm64/shinmohaa-macos-arm64.zip release_assets/

          # Web game
          [ -f artifacts/web-export/openmohaa-web.zip ] && \
            cp artifacts/web-export/openmohaa-web.zip release_assets/shinmohaa-web.zip

          # ── GDExtension libraries (for developers) ──
          for f in artifacts/gdextension-*/*.zip; do
            [ -f "$f" ] && cp "$f" release_assets/
          done

          echo "=== Release assets ==="
          ls -la release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          name: Release ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          body: |
            ## ShinMOHAA Game Downloads

            | Platform | Download |
            |----------|----------|
            | Windows (x86_64) | `shinmohaa-windows-x86_64.zip` |
            | Linux (x86_64) | `shinmohaa-linux-x86_64.zip` |
            | macOS (arm64) | `shinmohaa-macos-arm64.zip` |
            | Web | `shinmohaa-web.zip` |

            ### How to play
            1. Download the zip for your platform
            2. Extract to a folder
            3. Copy your MOHAA `Pak0.pk3`–`Pak6.pk3` files to `~/.local/share/openmohaa/main/` (Linux/macOS) or `%APPDATA%\openmohaa\main\` (Windows)
            4. Run the executable

            ### GDExtension Libraries (for developers)
            The `gdextension-*` zips contain only the engine libraries for use with the Godot editor.
          files: |
            release_assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
