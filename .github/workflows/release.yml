# Full release pipeline: build all platforms, create/update GitHub Release.
# Triggered only on release publish and manual dispatch.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        default: "v0.0.0-dev"
      create_release:
        description: "Create a GitHub Release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ─── Build each platform ───
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit

  build-android:
    uses: ./.github/workflows/build-android.yml
    secrets: inherit

  build-web:
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  # ─── Create GitHub Release with all artifacts ───
  release:
    needs: [build-linux, build-macos, build-windows, build-android, build-web]
    runs-on: ubuntu-22.04
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          # Collect all native zips
          cp artifacts/gdextension-*/*.zip release_assets/
          # Web is already zipped as openmohaa-web.zip inside its folder
          cp artifacts/web-export/openmohaa-web.zip release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          name: Release ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            release_assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
