# =============================================================================
# OpenMoHAA Web — Docker Compose
# =============================================================================
# Two profiles:
#
#   DEV (default) — mounts local dist/web/<variant>/ build output:
#     WEB_DIST=./dist/web/debug ASSET_PATH=/path/to/mohaa-assets docker compose -f docker/docker-compose.yml up
#
#   PROD — pulls pre-built GHCR image (same as Portainer):
#     ASSET_PATH=/path/to/mohaa-assets docker compose -f docker/docker-compose.yml --profile prod up
#
# Required env vars:
#   ASSET_PATH — host directory containing main/, mainta/, maintt/ with pk3s
#   WEB_DIST   — path to web export directory (default: ./dist/web/debug)
# =============================================================================

services:
  # --- Dev: mount local files, no image build needed ---
  web:
    image: nginx:alpine
    container_name: mohaa-godot-web
    ports:
      - "8086:80"
    environment:
      - CDN_URL=${CDN_URL:-/assets}
    volumes:
      - ${WEB_DIST:-../dist/web/debug}:/srv/web:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${ASSET_PATH:?Set ASSET_PATH to game assets directory}:/srv/assets:ro
    restart: unless-stopped

  # --- Prod: pre-built GHCR image (for Portainer / production) ---
  web-prod:
    image: ghcr.io/elgansayer/mohaa-godot:latest
    container_name: mohaa-godot-web
    profiles: [prod]
    ports:
      - "8086:80"
    environment:
      - CDN_URL=${CDN_URL:-/assets}
    volumes:
      - ${ASSET_PATH:?Set ASSET_PATH to game assets directory}:/srv/assets:ro
    restart: unless-stopped

  relay:
    build: ../relay
    container_name: mohaa-godot-relay
    network_mode: host
    restart: unless-stopped
