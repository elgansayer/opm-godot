server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index mohaa.html index.html;

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Serve the WASM cgame module from the HTML root (not gamedata).
    # This exact-match takes priority over the regex /main/ location below,
    # ensuring the engine gets the WASM build instead of a Linux ELF binary.
    location = /main/cgame.so {
        root /usr/share/nginx/html;
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    # Serve /main/ from the /gamedata/main/ directory via alias.
    # ASSET_PATH should point to the game install root (containing main/, mainta/, maintt/).
    # GET /main/        -> JSON directory listing of /gamedata/main/
    # GET /main/foo.pk3 -> /gamedata/main/foo.pk3
    location ~ ^/main(/|$)(.*)$ {
        alias /gamedata/main/$2;
        index off;
        autoindex on;
        autoindex_format json;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }



    location / {
        try_files $uri $uri/ /mohaa.html;
    }

    location ~* \\.wasm$ {
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    location ~* \\.(pck|data|js|css|png|jpg|jpeg|svg|json)$ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }
}
