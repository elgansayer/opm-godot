server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index mohaa.html index.html;

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Serve game roots from two sources:
    #  - /usr/share/nginx/html (repo, contains runtime binaries/config)
    #  - /gamedata (host assets: pk3 + loose game files)
    location ~* ^/(main|mainta|maintt)/.*\.(so|cfg)$ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # For game asset paths, never fall back to mohaa.html.
    # Try repo root first, then external /gamedata mount.
    location ~* ^/(main|mainta|maintt)/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
        try_files $uri @gamedata;
    }

    location @gamedata {
        root /gamedata;
        try_files $uri =404;
    }

    # Compatibility: some paths request Pak6 with uppercase P.
    location = /main/Pak6.pk3 {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
        root /gamedata;
        try_files /main/Pak6.pk3 /main/pak6.pk3 =404;
    }

    location / {
        try_files $uri $uri/ /mohaa.html;
    }

    location ~* \\.wasm$ {
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    location ~* \\.(pck|data|js|css|png|jpg|jpeg|svg|json)$ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store" always;
    }
}
