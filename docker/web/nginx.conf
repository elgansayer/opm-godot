# OpenMoHAA Web — nginx configuration
# Serves Godot web export with COOP/COEP headers required for SharedArrayBuffer.

server {
    listen 80;
    server_name _;

    # --- COOP / COEP — required for SharedArrayBuffer (multi-threaded WASM) ---
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;

    # --- Web export files ---
    location / {
        root /srv/web;
        index mohaa.html;
        try_files $uri $uri/ =404;

        # Correct MIME types for Godot web export
        types {
            text/html                 html;
            application/javascript    js;
            application/wasm          wasm;
            application/octet-stream  pck;
            image/png                 png;
            image/svg+xml             svg;
        }

        # WASM and PCK files can be large — disable buffering limits
        client_max_body_size 0;
    }

    # --- Game assets (pk3 files) ---
    location /assets/ {
        alias /srv/assets/;
        autoindex on;
        autoindex_format json;
        charset utf-8;

        # pk3 files are ZIP archives
        types {
            application/octet-stream  pk3;
        }
    }
}
