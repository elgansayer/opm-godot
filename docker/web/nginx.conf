# OpenMoHAA Web — nginx configuration
# Serves Godot web export with COOP/COEP headers required for SharedArrayBuffer.

server {
    listen 80;
    server_name _;

    # --- COOP / COEP — required for SharedArrayBuffer (multi-threaded WASM) ---
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;

    # --- Web export files ---
    location / {
        root /srv/web;
        index mohaa.html;
        try_files $uri $uri/ =404;

        # Inject CDN config script (generated by docker-entrypoint.sh) into HTML.
        # The script sets window.MOHAA_CDN_URL before mohaa.js loads.
        sub_filter '</head>' '<script src="/mohaa-cdn-config.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;

        # Correct MIME types for Godot web export (overrides inherited types)
        types {
            text/html                 html;
            application/javascript    js;
            application/wasm          wasm;
            application/octet-stream  pck;
            image/png                 png;
            image/svg+xml             svg;
        }

        # WASM and PCK files can be large — disable buffering limits
        client_max_body_size 0;
    }

    # --- CDN runtime config (generated by docker-entrypoint.sh) ---
    location = /mohaa-cdn-config.js {
        alias /tmp/mohaa-cdn-config.js;
        default_type application/javascript;
    }

    # --- Game assets (pk3 files) ---
    location /assets/ {
        alias /srv/assets/;
        autoindex on;
        autoindex_format json;
        charset utf-8;

        # pk3 files are ZIP archives
        types {
            application/octet-stream  pk3;
        }
    }

    # --- Relay health check (plain HTTP) ---
    location = /health {
        proxy_pass http://127.0.0.1:12300/health;
        proxy_http_version 1.1;
    }

    # --- WebSocket relay proxy ---
    # The embedded relay (mohaa_relay.js) listens on localhost:12300.
    # Web clients connect to wss://host/relay via the front-end TLS proxy.
    location /relay {
        proxy_pass http://127.0.0.1:12300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
