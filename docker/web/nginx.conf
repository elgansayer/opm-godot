# OpenMoHAA Web — nginx configuration
# Serves Godot web export with COOP/COEP headers required for SharedArrayBuffer.

server {
    listen 80;
    server_name _;

    # --- COOP / COEP — required for SharedArrayBuffer (multi-threaded WASM) ---
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;

    # --- Web export files ---
    location / {
        root /srv/web;
        index mohaa.html;
        try_files $uri $uri/ =404;

        # Inject CDN config script (generated by docker-entrypoint.sh) into HTML.
        # The script sets window.MOHAA_CDN_URL before mohaa.js loads.
        sub_filter '</head>' '<script src="/mohaa-cdn-config.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;

        # Correct MIME types for Godot web export (overrides inherited types)
        types {
            text/html                 html;
            application/javascript    js;
            application/wasm          wasm;
            application/octet-stream  pck;
            image/png                 png;
            image/svg+xml             svg;
        }

        # WASM and PCK files can be large — disable buffering limits
        client_max_body_size 0;
    }

    # --- CDN runtime config (generated by docker-entrypoint.sh) ---
    location = /mohaa-cdn-config.js {
        alias /tmp/mohaa-cdn-config.js;
        default_type application/javascript;
    }

    # --- Game assets (pk3 files) ---
    location /assets/ {
        alias /srv/assets/;
        autoindex on;
        autoindex_format json;
        charset utf-8;

        # pk3 files are ZIP archives
        types {
            application/octet-stream  pk3;
        }
    }

    # --- CDN CORS proxy ---
    # When an external CDN (cdn.moh-central.net etc.) lacks CORS headers,
    # the browser blocks cross-origin fetches.  This reverse-proxy path
    # lets the web client fetch through the same origin, avoiding CORS.
    # module_prerun.js rewrites cdn URLs to /cdn-proxy/ when it detects
    # cross-origin fetch failures.
    location ~ ^/cdn-proxy/(.*)$ {
        # Resolve the CDN hostname at runtime (handles DNS changes).
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Strip /cdn-proxy/ prefix and proxy to the real CDN URL.
        # The $cdn_backend variable is set by docker-entrypoint.sh via
        # a templated /etc/nginx/conf.d/cdn-proxy-upstream.conf.
        include /etc/nginx/conf.d/cdn-proxy-upstream.inc;

        # $cdn_backend already ends with '/' — append the captured path.
        # $1 is the regex capture from ^/cdn-proxy/(.*)$ — e.g. "main/Pak0.pk3".
        set $cdn_path $1;
        proxy_pass $cdn_backend$cdn_path;
        proxy_set_header Host $cdn_host;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        proxy_ssl_name $cdn_host;
        proxy_buffering off;
        proxy_read_timeout 300s;

        # Allow the browser to read Content-Length for progress tracking
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Accept" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # --- Relay health check (plain HTTP) ---
    location = /health {
        proxy_pass http://127.0.0.1:12300/health;
        proxy_http_version 1.1;
    }

    # --- WebSocket relay proxy ---
    # The embedded relay (mohaa_relay.js) listens on localhost:12300.
    # Web clients connect to wss://host/relay via the front-end TLS proxy.
    location /relay {
        proxy_pass http://127.0.0.1:12300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
