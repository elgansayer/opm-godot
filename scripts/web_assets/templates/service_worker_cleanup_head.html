<head>
<script>(function(){
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', function(){
    navigator.serviceWorker.getRegistrations()
      .then(function(regs){ return Promise.all(regs.map(function(reg){ return reg.unregister(); })); })
      .then(function(){
        if (!('caches' in window)) return;
        return caches.keys().then(function(keys){ return Promise.all(keys.map(function(key){ return caches.delete(key); })); });
      })
      .then(function(){ console.log('MOHAAjs: cleared stale service workers/caches'); })
      .catch(function(err){ console.warn('MOHAAjs: SW cleanup warning', err); });
  });
})();</script>
